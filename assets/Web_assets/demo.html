<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Kinetic Visual Demo</title>
    <link rel="stylesheet" href="./paper-kinetic-visual.css">
    <style>
      :root {
        color: #141414;
        background: #f6f2e9;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: clamp(24px, 5vw, 64px);
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 54px);
        line-height: 0.98;
        letter-spacing: -0.02em;
      }

      p {
        max-width: 680px;
        margin: 0 0 32px;
        color: #545454;
        line-height: 1.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(20px, 3vw, 36px);
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 13px;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      @media (max-width: 1080px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PaperKineticVisual</h1>
      <p>Abstract interactive paper hero visuals for research cards. These are identity objects, not explanatory diagrams.</p>

      <div class="grid">
        <section class="panel">
          <h2>HamJEPA</h2>
          <div id="hamjepa-visual"></div>
        </section>
        <section class="panel">
          <h2>Chebyshev</h2>
          <div id="chebyshev-visual"></div>
        </section>
        <section class="panel">
          <h2>Foliation</h2>
          <div id="foliation-visual"></div>
        </section>
      </div>
    </main>

    <script type="module">
      import { PaperKineticVisual } from "./PaperKineticVisual.js";

      PaperKineticVisual({
        container: "#hamjepa-visual",
        variant: "hamjepa",
      });

      PaperKineticVisual({
        container: "#chebyshev-visual",
        variant: "chebyshev",
      });

      PaperKineticVisual({
        container: "#foliation-visual",
        variant: "foliation",
      });
    </script>
  </body>
</html>
